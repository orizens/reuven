<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#1e40af"/>
  <!-- Garage door frame -->
  <rect x="5" y="8" width="22" height="18" rx="1.5" fill="white" opacity="0.15"/>
  <!-- Garage door panel lines -->
  <rect x="5" y="8" width="22" height="18" rx="1.5" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Panel dividers (horizontal) -->
  <line x1="5" y1="14" x2="27" y2="14" stroke="white" stroke-width="1.2" opacity="0.9"/>
  <line x1="5" y1="19.5" x2="27" y2="19.5" stroke="white" stroke-width="1.2" opacity="0.9"/>
  <!-- Center vertical divider -->
  <line x1="16" y1="8" x2="16" y2="26" stroke="white" stroke-width="1" opacity="0.5"/>
  <!-- Orange door handle dot -->
  <circle cx="16" cy="23.5" r="1.5" fill="#f97316"/>
</svg>
